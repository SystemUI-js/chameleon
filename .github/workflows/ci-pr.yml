name: PR CI (tests & build)

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  pr-checks:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: |
          corepack enable
          yarn --version
          yarn install --frozen-lockfile

      - name: Run lint
        run: |
          yarn lint

      - name: Run unit tests
        run: |
          yarn test

      - name: Install Playwright Chromium
        id: install-playwright
        run: |
          npx playwright install --with-deps chromium

      - name: Run Playwright UI tests
        id: run-playwright-ui-tests
        run: |
          yarn test:ui

      - name: Upload Playwright report
        if: ${{ always() && (steps.install-playwright.conclusion == 'failure' || steps.run-playwright-ui-tests.conclusion == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: ${{ always() && (steps.install-playwright.conclusion == 'failure' || steps.run-playwright-ui-tests.conclusion == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

      - name: Build
        run: |
          yarn build

      - name: Verify npm pack (dry-run)
        run: |
          npm pack --dry-run
